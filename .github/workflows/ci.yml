name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: PHP 8.4 Quality
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.BABELFORGE_GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2

      - name: Configure Composer GitHub access
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "Missing BABELFORGE_GITHUB_TOKEN secret with read access to private babelforge repositories."
            exit 1
          fi

          composer config --global github-oauth.github.com "${GH_TOKEN}"

          {
            echo "machine github.com"
            echo "  login x-access-token"
            echo "  password ${GH_TOKEN}"
          } > ~/.netrc
          chmod 600 ~/.netrc

          if git config --global --get-all http.https://github.com/.extraheader >/dev/null 2>&1; then
            git config --global --unset-all http.https://github.com/.extraheader
          fi

          if ! git ls-remote "https://github.com/babelforge/member-graph.git" HEAD >/dev/null 2>&1; then
            echo "::error::BABELFORGE_GITHUB_TOKEN cannot clone https://github.com/babelforge/member-graph.git over HTTPS. Check that the token has read access to the private repository and that checkout credentials are not overriding it."
            exit 1
          fi

      - name: Validate Composer configuration
        run: composer validate --strict --no-check-publish

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Check code style
        run: composer cs

      - name: Analyse source
        run: vendor/bin/phpstan analyse src --no-progress --error-format=table

      - name: Analyse tests
        run: vendor/bin/phpstan analyse tests --no-progress --error-format=table

      - name: Run tests
        run: vendor/bin/phpunit
